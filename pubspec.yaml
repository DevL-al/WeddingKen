name: weddingken
description: Weddingken - aplikasi pemesanan wedding organizer berbasis Flutter dan Firebase Spark Plan.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.15.0
  firebase_auth: ^5.6.1
  cloud_firestore: ^5.6.10
  intl: ^0.20.2
  #firebase_storage: ^12.4.4
  http: ^1.2.2
  #file_picker: ^10.3.10
  #image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true